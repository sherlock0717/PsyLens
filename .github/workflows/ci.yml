name: Public Release CI

on:
  push:
    branches: ["release/public-v2", "main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Public release checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff python-docx

      - name: Compile Python files
        run: python -m compileall demo/src pipeline tools/run_demo.py

      - name: Ruff - Demo source
        run: ruff check demo/src

      - name: Ruff - Demo tests
        run: ruff check demo/tests

      - name: Ruff - Pipeline templates
        run: ruff check pipeline

      - name: Ruff - Demo entry
        run: ruff check tools/run_demo.py

      - name: Ruff - Public release tests
        run: ruff check tests

      - name: Demo tests
        run: python -m pytest demo/tests -q

      - name: Public files and counts
        run: python -m pytest tests/test_public_release.py::test_required_public_files_exist tests/test_public_release.py::test_public_data_counts_and_fields -q

      - name: Public URL and manifest checks
        run: python -m pytest tests/test_public_release.py::test_public_data_contains_no_external_urls tests/test_public_release.py::test_public_manifest_matches_files -q

      - name: Page and showcase checks
        run: python -m pytest tests/test_public_release.py::test_page_copy_is_public_facing tests/test_public_release.py::test_showcase_is_main_ready_and_clean -q

      - name: README and DOCX checks
        run: python -m pytest tests/test_public_release.py::test_readme_uses_public_release_paths tests/test_public_release.py::test_project_brief_is_readable_docx -q

      - name: Demo smoke
        run: python tools/run_demo.py --provider mock --output artifacts/demo/ci
