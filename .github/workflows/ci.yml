name: CI

on:
  push:
    branches: ["phase1/rebuild-evidence-and-demo"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: 测试与校验（${{ matrix.os }}）
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff

      - name: 语法编译（compileall）
        run: python -m compileall tools demo/src

      - name: 静态检查（Ruff）
        run: ruff check tools demo/src tests
        continue-on-error: true

      - name: 单元测试（pytest）
        run: python -m pytest -q

      - name: v2 审计（分层状态由 pytest 断言；此处仅打印）
        run: |
          python tools/audit_public_data.py --dataset v2 || true
        shell: bash

      - name: Demo smoke（离线 mock）
        run: python tools/run_demo.py --provider mock --output artifacts/demo/ci

      - name: 页面数据构建
        run: python tools/build_showcase_data.py

      - name: 页面静态校验
        run: python -m pytest tests/test_site_static.py -q

      - name: 历史文件保护 / 分层状态 / 无密钥
        run: python -m pytest tests/test_ci_guards.py -q

      - name: 确认工作树无历史数据改动
        run: git diff --exit-code -- docs/files data/v2
        shell: bash
