name: Public Release CI

on:
  push:
    branches: ["release/public-v2", "main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Public release checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff python-docx

      - name: Compile Python files
        run: python -m compileall demo/src pipeline tools/run_demo.py

      - name: Ruff
        run: ruff check demo/src demo/tests pipeline tools/run_demo.py tests

      - name: Tests
        run: python -m pytest demo/tests tests -q

      - name: Demo smoke
        run: python tools/run_demo.py --provider mock --output artifacts/demo/ci
