name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate public release
        run: |
          python -m compileall demo/src pipeline tools tests demo/tests
          ruff check demo/src demo/tests pipeline tools tests
          python tools/lint_public_copy.py --root . --quality-gate P1 --format json
          python -m pytest demo/tests tests -q
          python tools/normalize_public_dataset.py --source-dir data/public --output-dir artifacts/normalized_public
          python tools/summarize_public_analysis.py --public-dir data/public --output artifacts/public_analysis_summary.json
          python tools/build_project_brief_docx.py --output artifacts/PsyLens_project_brief.docx
          python tools/run_demo.py --provider mock --output artifacts/demo/pages

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
