name: Public Analysis Artifacts

on:
  push:
    branches: ["revamp/analysis-methods-doc"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[generated-public-data]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: revamp/analysis-methods-doc
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Remove trailing copyright paragraph from generator
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("tools/build_project_brief_docx.py")
          text = path.read_text(encoding="utf-8")
          target = '''    p = doc.add_paragraph()
              p.alignment = WD_ALIGN_PARAGRAPH.CENTER
              p.paragraph_format.space_before = Pt(22)
              font(p.add_run("Copyright © 2026 Sherlock0717. All rights reserved."), size=8.5, color=MUTED)

          '''.replace("          ", "")
          count = text.count(target)
          if count not in {0, 1}:
              raise SystemExit(f"unexpected target count: {count}")
          if count == 1:
              path.write_text(text.replace(target, "", 1), encoding="utf-8")
          PY
      - name: Normalize public dataset
        run: python tools/normalize_public_dataset.py --source-dir data/public --output-dir artifacts/normalized_public
      - name: Build analysis summary
        run: python tools/summarize_public_analysis.py --public-dir data/public --output artifacts/public_analysis_summary.json
      - name: Build formal project brief
        run: python tools/build_project_brief_docx.py --output docs/files/PsyLens_project_brief.docx
      - name: Commit corrected generator and document
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/build_project_brief_docx.py docs/files/PsyLens_project_brief.docx
          if git diff --cached --quiet; then
            echo "Project brief already current."
          else
            git commit -m "docs: remove trailing blank project brief page [generated-public-data]"
            git push origin HEAD:revamp/analysis-methods-doc
          fi
