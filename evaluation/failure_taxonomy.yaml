# 失败类型分类（failure_taxonomy.yaml）
failure_types:
  data_integrity:
    - id: duplicate_id
      desc: 样本或证据 ID 重复
      severity: block
    - id: evidence_text_not_locatable
      desc: 证据文本无法在样本原文中定位
      severity: block
    - id: parent_semantic_link_missing
      desc: legacy 证据无法回到声明父样本（历史遗留）
      severity: warn
  coding:
    - id: invalid_label
      desc: 机制/话题标签超出 codebook
      severity: block
    - id: evidence_phrase_not_locatable
      desc: evidence_phrase 无法在证据文本中定位
      severity: block
    - id: over_labeling
      desc: 为覆盖率强行分配机制（uncertain 被回避）
      severity: warn
  insight:
    - id: unresolved_support_id
      desc: 洞察引用的证据 ID 不存在
      severity: block
    - id: low_support
      desc: 洞察支撑证据过少
      severity: warn
    - id: single_platform_overclaim
      desc: 单平台洞察被表述为跨平台共识
      severity: warn
    - id: correlation_as_causation
      desc: 相关性被表述为因果
      severity: warn
  action:
    - id: unresolved_insight_id
      desc: 建议引用的洞察 ID 不存在
      severity: block
    - id: unresolved_evidence_id
      desc: 建议引用的证据 ID 不存在
      severity: block
    - id: missing_validation
      desc: 建议缺少验证方法或预期效果
      severity: warn
  run:
    - id: parse_failure
      desc: 数据文件无法解析
      severity: block
    - id: output_hash_mismatch
      desc: 输出文件哈希与记录不一致
      severity: block
    - id: nondeterministic
      desc: 相同输入产生不同输出
      severity: warn
  claim:
    - id: overclaim_human_review
      desc: 无记录却声称已人工复核
      severity: block
    - id: overclaim_certainty
      desc: 使用"可直接采信/已验证/数据真实"等过强表述
      severity: block
