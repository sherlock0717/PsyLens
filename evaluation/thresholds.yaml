# PsyLens 公开发布门槛
# block: 未达标时阻止发布；warn: 记录风险并解释。

thresholds:
  sample_id_unique_rate: { min: 1.0, level: block }
  evidence_id_unique_rate: { min: 1.0, level: block }
  parent_reference_rate: { min: 1.0, level: block }
  platform_match_rate: { min: 1.0, level: block }
  evidence_text_match_rate: { min: 1.0, level: block }

  public_url_hit_count: { max: 0, level: block }
  sample_duplicate_group_count: { max: 0, level: warn }
  evidence_duplicate_group_count: { max: 0, level: warn }
  required_field_completion_rate: { min: 1.0, level: block }
  manifest_hash_match_rate: { min: 1.0, level: block }

  valid_surface_topic_rate: { min: 1.0, level: block }
  valid_mechanism_rate: { min: 1.0, level: block }
  explicit_topic_rate: { min: 0.35, level: warn }
  assigned_mechanism_rate: { min: 0.35, level: warn }
  mechanism_uncertain_rate: { max: 0.60, level: warn }
  inclusion_flagged_uncertain_rate: { max: 0.30, level: warn }
  samples_without_evidence_rate: { max: 0.02, level: warn }

  claim_has_source_dataset: { min: 1.0, level: block }
  claim_has_denominator: { min: 1.0, level: block }
  claim_has_scope: { min: 1.0, level: block }
  platform_density_reported: { min: 1.0, level: warn }
  causal_language_check: { min: 1.0, level: block }

  parse_success_rate: { min: 1.0, level: block }
  deterministic_demo_rate: { min: 1.0, level: block }
  generated_analysis_match: { min: 1.0, level: block }
  cross_platform_ci: { min: 1.0, level: block }
  pages_validation: { min: 1.0, level: block }
