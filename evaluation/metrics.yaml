# PsyLens 公开评测指标
# 语义与公开数据、页面和离线 Demo 对齐。

groups:
  A_structure_integrity:
    title: 结构完整性
    metrics:
      sample_id_unique_rate:
        definition: 样本 ID 唯一比例
        numerator: 唯一 sample_id 数
        denominator: 样本总数
        current: 1.0
      evidence_id_unique_rate:
        definition: 证据 ID 唯一比例
        numerator: 唯一 evidence_id 数
        denominator: 证据总数
        current: 1.0
      parent_reference_rate:
        definition: 证据能够找到父样本的比例
        numerator: 父样本存在的证据数
        denominator: 证据总数
        current: 1.0
      platform_match_rate:
        definition: 证据与父样本平台字段一致的比例
        numerator: 平台一致证据数
        denominator: 证据总数
        current: 1.0
      evidence_text_match_rate:
        definition: 证据文本能够在父样本公开文本中定位的比例
        numerator: 可定位证据数
        denominator: 证据总数
        current: 1.0

  B_cleaning_privacy:
    title: 清洗与隐私
    metrics:
      public_url_hit_count:
        definition: 公开数据文件中检出的 URL 数量
        current: 0
      sample_duplicate_group_count:
        definition: 规范化后样本文本重复组数量
        current: 0
      evidence_duplicate_group_count:
        definition: 规范化后证据文本重复组数量
        current: 0
      required_field_completion_rate:
        definition: 必填字段非空比例；日期等可选字段单独记录
      manifest_hash_match_rate:
        definition: 公开文件 SHA-256 与 manifest 记录一致的比例

  C_coding_usability:
    title: 编码可用性
    metrics:
      valid_surface_topic_rate:
        definition: 表层话题属于 codebook 的比例
      valid_mechanism_rate:
        definition: 机制标签属于 codebook 的比例
      explicit_topic_rate:
        definition: 表层话题不为 other_uncertain 的比例
        numerator: 能够分配具体话题的证据数
        denominator: 证据总数
        current: 0.475728
      assigned_mechanism_rate:
        definition: 机制标签不为 uncertain 的比例
        numerator: 能够分配主要机制的证据数
        denominator: 证据总数
        current: 0.475728
      mechanism_uncertain_rate:
        definition: 机制标签为 uncertain 的比例
        numerator: uncertain 证据数
        denominator: 证据总数
        current: 0.524272
      inclusion_flagged_uncertain_rate:
        definition: 证据纳入状态为 included_flagged_uncertain 的比例
        numerator: 纳入提醒证据数
        denominator: 证据总数
        current: 0.175836
      samples_without_evidence_rate:
        definition: 未切出可保留证据的样本比例
        numerator: 无证据样本数
        denominator: 样本总数
        current: 0.005556

  D_analysis_support:
    title: 分析支撑
    metrics:
      claim_has_source_dataset:
        definition: 页面数量结论是否指向公开计算数据
      claim_has_denominator:
        definition: 比例结论是否明确分母
      claim_has_scope:
        definition: 结论是否说明平台、抽样与编码来源范围
      platform_density_reported:
        definition: 跨平台比较是否同时报告每样本证据密度
      causal_language_check:
        definition: 探索性分布是否避免直接因果表述

  E_run_reproducibility:
    title: 运行与复现
    metrics:
      parse_success_rate:
        definition: 目标 CSV、JSON、YAML 与 DOCX 成功解析的比例
      deterministic_demo_rate:
        definition: 相同输入与配置下 Demo 产物一致比例
      generated_analysis_match:
        definition: 提交的 analysis_summary 与公开数据重新生成结果一致
      cross_platform_ci:
        definition: Ubuntu 与 Windows 发布校验均通过
      pages_validation:
        definition: Pages 部署前完成公开数据、页面与文档测试
